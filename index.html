<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Triple Peaks Coffee Shop</title>
  <meta name="description" content="Triple Peaks Coffee Shop - Specialty coffee and cozy vibes in the library.">
  <meta name="keywords" content="coffee, cafe, Triple Peaks, library, specialty coffee, recipes">
  <meta name="author" content="Software Engineer" />
  <meta name="keywords" content="HTML, CSS"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="vendor/normalize.css">
  <link rel="stylesheet" href="pages/index.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div class="page">
    <header class="header">
      <!-- Header content remains unchanged -->
    </header>

    <main class="content">
      <!-- Recipes Section -->
      <section class="recipes" id="recipes">
        <h2 class="recipes__title">Recipes</h2>
        <p class="recipes__subtitle">Check out some recipes we've collected for your home-brewing convenience:</p>
        <ul class="recipes__videos">
          <li>
            <iframe class="recipes__iframe" src="https://www.youtube.com/embed/j6VlT_jUVPc" allowfullscreen></iframe>
            <p class="recipes__video-caption">
              <span>Aeropress recipe</span>
              <span>~5 min</span>
            </p>
          </li>
          <li>
            <iframe class="recipes__iframe" src="https://www.youtube.com/embed/st571DYYTR8" allowfullscreen></iframe>
            <p class="recipes__video-caption">
              <span>French press recipe</span>
              <span>~15 min</span>
            </p>
          </li>
        </ul>
      </section>

      <!-- Animation Section -->
      <section class="animations" id="animations">
        <h2 class="animations__title">Coffee Animations</h2>
        <p class="animations__description">
          Enjoy these delightful coffee animations for inspiration and relaxation.
        </p>
        <div class="animations__content">
          <img src="images/coffee_animation1.gif" alt="Coffee Brewing Animation" class="animations__gif">
          <img src="images/coffee_animation2.gif" alt="Latte Art Animation" class="animations__gif">
        </div>
      </section>
    </main>

    <footer class="footer">
      <!-- Footer content goes here -->
    </footer>
  </div>
</body>

</html>
